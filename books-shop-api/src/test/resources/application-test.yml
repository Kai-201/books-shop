spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:books_shop;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: test-jwt-secret-key
  expire-hours: 24
